<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HanGarden Redirect</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f7f3;
        color: #1f3228;
      }

      main {
        width: min(480px, calc(100% - 32px));
        border: 1px solid #d4ddd6;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 40px rgba(31, 50, 40, 0.12);
        padding: 28px 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #4f6458;
      }

      code {
        display: block;
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #eef4ef;
        color: #245b42;
        font-size: 13px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HanGarden</h1>
      <p id="message">최신 시연 주소로 이동하고 있습니다.</p>
      <code id="target">redirect-target.json</code>
    </main>

    <script>
      const messageEl = document.getElementById('message');
      const targetEl = document.getElementById('target');

      async function redirectToTunnel() {
        try {
          const response = await fetch(`./redirect-target.json?ts=${Date.now()}`, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error(`Failed to load redirect-target.json (${response.status})`);
          }

          const payload = await response.json();
          if (!payload || typeof payload.targetUrl !== 'string' || !payload.targetUrl.trim()) {
            throw new Error('redirect-target.json does not contain a valid targetUrl.');
          }

          const targetBase = payload.targetUrl.trim().replace(/\/+$/, '');
          const path = window.location.pathname.replace(/\/index\.html$/, '');
          const normalizedPath = path === '/' ? '' : path;
          const nextUrl = `${targetBase}${normalizedPath}${window.location.search}${window.location.hash}`;

          targetEl.textContent = nextUrl;
          window.location.replace(nextUrl);
        } catch (error) {
          messageEl.textContent = '리디렉션 주소를 불러오지 못했습니다. redirect-target.json 값을 확인해 주세요.';
          targetEl.textContent = error instanceof Error ? error.message : String(error);
        }
      }

      redirectToTunnel();
    </script>
  </body>
</html>
